{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="content-area">

<div class="table-card">

<h2>My Posted Jobs</h2>

<table class="jobs-table">

<thead>
<tr>
<th>Title</th>
<th>Location</th>
<th>Pay</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

{% for job in jobs %}

<tr>
<td>{{ job.title }}</td>
<td>{{ job.location }}</td>
<td>Ksh {{ job.pay }}</td>

<td>
<span class="status-badge open">Open</span>
</td>

<td class="actions">

<a href="#" class="btn-view">View</a>

<a href="#" class="btn-delete">Delete</a>

</td>

</tr>

{% empty %}

<tr>
<td colspan="5" class="no-jobs">
You have not posted any jobs yet.
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

{% endblock %}
