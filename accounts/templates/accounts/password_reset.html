{% extends "auth_base.html" %}

{% block content %}

<h2>Forgot Password</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send Reset Link</button>
</form>

<a href="{% url 'login' %}">Back to Login</a>

{% endblock %}
