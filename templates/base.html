<!--contains the common layout for html page structures, hence other pages plug into it -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Casual Labour Marketplace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% load static %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
    <div class="nav-container">

        <div class="nav-left">
            <a href="{% url 'landing' %}" class="logo">CLM</a>
        </div>

        <div class="nav-right">
            <a href="{% url 'home' %}">Home</a>

            {% if request.path != '/' %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'accounts:register_role' %}">Register</a>
            {% endif %}
        </div>

    </div>
</nav>
    <!-- <div class="navbar">
    <div class="logo">CLM</div>
    <div>
       <a href="{% url 'home' %}">Home</a>
        <a href="/accounts/login/">Login</a>
        <a href="/accounts/register/" class="nav-btn">Register</a>
    </div>
</div> -->

    <!-- PAGE CONTENT -->
    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
