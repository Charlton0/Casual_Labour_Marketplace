{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>CLMS</title>

    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">

            <!-- Django Messages -->
            {% if messages %}
    {% for message in messages %}
        <div class="message {{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

            {% block content %}
            {% endblock %}

        </div>
    </div>

</body>
</html>
